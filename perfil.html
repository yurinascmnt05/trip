<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perfil e Viagens - Trip Finance</title>
    <!-- Fontes do Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        /* CSS Específico do Perfil */
        .profile-card {
            background-color: var(--bg-white);
            border-radius: 24px;
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            margin-bottom: 24px;
        }

        .profile-info h2 {
            font-size: 20px;
            color: var(--text-dark);
            margin-bottom: 4px;
        }

        .profile-info p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .edit-profile-btn {
            background: rgba(0, 208, 156, 0.1);
            color: var(--primary-green);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .edit-profile-btn:hover {
            opacity: 0.8;
        }

        .trips-section h3 {
            font-size: 16px;
            color: var(--text-dark);
            font-weight: 700;
            margin-bottom: 16px;
        }

        .trip-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .trip-item {
            background-color: white;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        .trip-icon {
            background-color: var(--icon-bg);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .trip-details strong {
            display: block;
            color: var(--text-dark);
            font-size: 14px;
            margin-bottom: 2px;
        }

        .trip-details span {
            color: var(--text-muted);
            font-size: 12px;
        }

        .new-trip-form {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
        }
    </style>
</head>

<body>
    <div class="mobile-container">
        <!-- HEADER VERDE SIMPLIFICADO -->
        <header class="top-header" style="padding-bottom: 40px; flex-shrink: 0;">
            <div class="header-top" style="margin-bottom: 0;">
                <div class="greeting">
                    <h1>Configurações</h1>
                    <p>Perfil e Diário de Viagens</p>
                </div>
            </div>
        </header>

        <!-- MAIN CONTENT (Estático e Rolável) -->
        <main class="main-content" style="margin-top: -20px; z-index: 2; position: relative;">

            <!-- CARD DE PERFIL -->
            <div class="profile-card">
                <div class="profile-info">
                    <h2 id="traveler-names">Yuri & Danny</h2>
                    <p>Viajantes Principais</p>
                </div>
                <button class="edit-profile-btn" id="edit-profile-btn" title="Editar Nomes">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
                    </svg>
                </button>
            </div>

            <!-- DIÁRIO DE VIAGENS -->
            <div class="trips-section">
                <h3>Diário de Viagens</h3>

                <div class="trip-list" id="trip-list">
                    <!-- Item Fixo de Exemplo -->
                    <div class="trip-item">
                        <div class="trip-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                <circle cx="12" cy="10" r="3"></circle>
                            </svg>
                        </div>
                        <div class="trip-details">
                            <strong>Viagem pra praia</strong>
                            <span>18/12/26</span>
                        </div>
                    </div>
                </div>

                <!-- FORMULÁRIO NOVA VIAGEM -->
                <form id="new-trip-form" class="new-trip-form">
                    <div class="form-group">
                        <label>Nova Viagem (Destino)</label>
                        <input type="text" id="trip-name" placeholder="Ex: Paris" required>
                    </div>
                    <div class="form-group" style="margin-top: 12px;">
                        <label>Data</label>
                        <input type="date" id="trip-date" required>
                    </div>
                    <button type="submit" class="btn-save" style="margin-top: 16px;">Registrar Viagem</button>
                </form>
            </div>

        </main>

        <!-- BOTTOM NAVIGATION BAR -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </a>
            <a href="historico.html" class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="8" y1="6" x2="21" y2="6"></line>
                    <line x1="8" y1="12" x2="21" y2="12"></line>
                    <line x1="8" y1="18" x2="21" y2="18"></line>
                    <line x1="3" y1="6" x2="3.01" y2="6"></line>
                    <line x1="3" y1="12" x2="3.01" y2="12"></line>
                    <line x1="3" y1="18" x2="3.01" y2="18"></line>
                </svg>
            </a>
            <a href="perfil.html" class="nav-item active">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </a>
        </nav>
    </div>

    <!-- Bibliotecas do Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <!-- O nosso script -->
    <script src="./js/app.js"></script>
</body>

</html>
