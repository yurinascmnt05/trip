<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Histórico - Trip Finance</title>
    <!-- Fontes do Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="mobile-container">
        <!-- HEADER VERDE -->
        <header class="top-header" style="padding-bottom: 20px;">
            <div class="header-top">
                <a href="index.html" class="back-button">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </a>
                <h1 style="color: var(--primary-dark); font-size: 18px; font-weight: 700;">Histórico</h1>
                <div class="notification-icon" style="visibility: hidden;"></div>
            </div>

            <div class="balance-cards">
                <div class="balance-card">
                    <span class="card-label">Orçamento</span>
                    <!-- Orçamento Editável via Clique -->
                    <h2 id="display-budget" class="editable-budget" title="Tocar para Editar Orçamento">
                        $ 0.00
                        <svg class="edit-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
                    </h2>
                </div>
                <div class="divider"></div>
                <div class="balance-card">
                    <span class="card-label">Total Gasto</span>
                    <h2 id="display-spent" class="text-blue">-$ 0.00</h2>
                </div>
            </div>
            
            <div class="progress-container" style="margin-bottom: 0;">
                <div class="progress-track">
                    <div class="progress-badge" id="progress-text">0%</div>
                    <div class="progress-fill" id="progress-bar"></div>
                </div>
            </div>
        </header>

        <!-- MAIN CONTENT: Lista Agrupada e Sincronização -->
        <main class="main-content">
            <div class="content-header">
                <h3>Transações</h3>
                <div class="sync-actions">
                    <button id="export-btn" title="Exportar">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                    </button>
                    <label for="import-file" title="Importar">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
                    </label>
                    <input type="file" id="import-file" accept=".json" style="display: none;">
                </div>
            </div>

            <!-- Lista injetada via JS, agrupada por Mês -->
            <div class="expenses-list" id="expenses-list">
            </div>
        </main>
        
        <!-- BOTTOM NAVIGATION BAR -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </a>
            <a href="historico.html" class="nav-item active">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
            </a>
            <a href="perfil.html" class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </a>
        </nav>
    </div>
    
    <script src="./js/app.js"></script>
</body>
</html>
