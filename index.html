<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trip Finance - Início</title>
    <!-- Fontes do Google inspiradas no design premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="mobile-container">
        <!-- TOP HEADER: Seção Verde e Informações Principais -->
        <header class="top-header">
            <div class="header-top">
                <div class="greeting">
                    <h1>Trip Finance</h1>
                    <p>Dashboard</p>
                </div>
                <!-- Botão de Histórico -->
                <a href="historico.html" class="notification-icon" title="Ver Histórico">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                </a>
            </div>

            <div class="balance-cards">
                <div class="balance-card">
                    <span class="card-label">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"></rect><line x1="2" y1="10" x2="22" y2="10"></line></svg> 
                        Orçamento
                    </span>
                    <!-- Orçamento Editável via Clique -->
                    <h2 id="display-budget" class="editable-budget" title="Tocar para Editar Orçamento">
                        $ 0.00
                        <svg class="edit-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
                    </h2>
                </div>
                <div class="divider"></div>
                <div class="balance-card">
                    <span class="card-label">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg> 
                        Total Gasto
                    </span>
                    <h2 id="display-spent" class="text-blue">-$ 0.00</h2>
                </div>
            </div>

            <div class="progress-container">
                <div class="progress-labels">
                    <span class="budget-limit" id="display-balance">Restante: $ 0.00</span>
                </div>
                <div class="progress-track">
                    <div class="progress-badge" id="progress-text">0%</div>
                    <div class="progress-fill" id="progress-bar"></div>
                </div>
                <p class="progress-subtitle">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                    Gasto do seu orçamento atual.
                </p>
            </div>
        </header>

        <!-- MAIN CONTENT: Grid de Categorias e Formulário -->
        <main class="main-content">
            <div class="add-expense-container" style="margin-top: 0; padding: 0; box-shadow: none; background: transparent;">
                <form id="expense-form" class="add-expense-form">
                    
                    <div class="form-group">
                        <h3 style="font-size: 16px; margin-bottom: 16px; font-weight: 700; color: var(--text-dark);">Categorias</h3>
                        
                        <!-- Grid Responsiva de Cards -->
                        <div class="category-grid" id="category-grid">
                            <div class="category-card" data-value="Alimentação">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 2v10a4 4 0 0 1-8 0V2M7 2v20M17 2v20M17 2a4 4 0 0 1 4 4v4h-8V6a4 4 0 0 1 4-4z"></path></svg>
                                <span>Alimentação</span>
                            </div>
                            <div class="category-card" data-value="Transporte">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"></path><circle cx="7" cy="17" r="2"></circle><path d="M9 17h6"></path><circle cx="17" cy="17" r="2"></circle></svg>
                                <span>Transporte</span>
                            </div>
                            <div class="category-card" data-value="Hospedagem">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                                <span>Hospedagem</span>
                            </div>
                            <div class="category-card" data-value="Lazer">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                                <span>Lazer</span>
                            </div>
                            <div class="category-card" data-value="Compras">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                                <span>Compras</span>
                            </div>
                            <div class="category-card" data-value="Outros">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                                <span>Outros</span>
                            </div>
                        </div>
                        <input type="hidden" id="expense-category" required>
                    </div>

                    <div class="form-group" style="margin-top: 24px;">
                        <label>Título e Valor</label>
                        <div style="display: flex; gap: 12px;">
                            <input type="text" id="expense-name" placeholder="Ex: Almoço" required style="flex: 2;">
                            <input type="number" id="expense-amount" placeholder="0.00" step="0.01" min="0" required style="flex: 1;">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-save" style="margin-top: 10px;">Adicionar Gasto</button>
                </form>
            </div>
        </main>
        
        <!-- BOTTOM NAVIGATION BAR -->
        <nav class="bottom-nav">
            <a href="index.html" class="nav-item active">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </a>
            <a href="historico.html" class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
            </a>
            <a href="perfil.html" class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </a>
        </nav>
    </div>
    
    <script src="./js/app.js"></script>
</body>
</html>
